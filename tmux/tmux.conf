# Eliminate escape delay - do not remove this
set -s escape-time 0
# Allows tab to be recognized independently from CTRL-i
set -s extended-keys on
set -s terminal-features[3] '*:extkeys'

set -g mode-keys vi
set -g mouse on
set -g set-clipboard on
set -g allow-passthrough on
set -g allow-rename off


set -g status-position top
set -g status-style bg=default,fg=white
set -g message-style bg=#C44300 # color of the statusbar message (e.g. "Config reloaded!")
set -g status-left ""
set -g status-right "#[fg=colour178] #{pane_title} "
set -g status-interval 1
set -g status-right-length 100

# Add visual gap with pane border
set -g pane-border-status top
set -g pane-border-format ""
set -g pane-border-style fg=#3A3A3A
set -g pane-active-border-style fg=#3A3A3A

# Tab/Window styling
setw -g window-status-style fg=silver,bg=default
setw -g window-status-current-style fg=white,bg=#C44300,bold
setw -g window-status-format " #W "
setw -g window-status-current-format " #W "

# CTRL+hjkl navigation
bind -n C-h if -F "#{pane_at_left}" "prev" "selectp -L"
bind -n C-j selectp -D
bind -n C-k selectp -U
bind -n C-l if -F "#{pane_at_right}" "next" "selectp -R"

# Ctrl+Tab swap the current window with its neighbor and keep focus on it.
bind -n C-BTab swapw -t -1 \; prev
bind -n C-Tab swapw -t +1 \; next

# Scroll wheel in copy-mode-vi (3 lines at a time, exit at bottom)
bind -T copy-mode-vi WheelUpPane send -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane { send -X -N 3 scroll-down; if -F "#{==:#{scroll_position},0}" "send -X cancel" }

# Exit copy mode on Escape.
bind -T copy-mode-vi Escape send -X cancel

# Ctrl+U/D scroll 10 lines (pass through to Neovim, exit copy mode at bottom)
bind -T copy-mode-vi C-u { send -X -N 10 scroll-up; send -X middle-line }
bind -T copy-mode-vi C-d { send -X -N 10 scroll-down; send -X middle-line; if -F "#{==:#{scroll_position},0}" 'send -X cancel' }
bind -n C-u if -F "#{||:#{==:nvim,#{pane_current_command}},#{==:lazygit,#{pane_current_command}}}" 'send C-u' 'if -F "#{==:#{history_size},0}" "" "copy-mode ; send -X -N 10 scroll-up ; send -X middle-line"'
bind -n C-d if -F "#{||:#{==:nvim,#{pane_current_command}},#{==:lazygit,#{pane_current_command}}}" 'send C-d' 'copy-mode ; send -X -N 10 scroll-down ; send -X middle-line ; if -F "#{==:#{scroll_position},0}" "send -X cancel"'

# Nested tmux helpers: map Alt+h / Alt+l to inner-session prev/next window.
bind -n M-h send-prefix \; send p
bind -n M-l send-prefix \; send n

# Ctrl+C copies selection or line (with flash)
bind -T copy-mode-vi C-c if -F "#{selection_present}" "send -X copy-selection" { send -X select-line; run "sleep 0.1"; send -X copy-selection }

# Resize panes with Ctrl+Alt+hjkl
bind -n C-M-h resizep -L 5
bind -n C-M-j resizep -D 5
bind -n C-M-k resizep -U 5
bind -n C-M-l resizep -R 5

# Hotkeys
bind v splitw -h -c "#{pane_current_path}"
bind s splitw -v -c "#{pane_current_path}"
bind x killp
bind q kill-server
bind k copy-mode

# Keep j/k pinned at the beginning of the line
bind -T copy-mode-vi j { send -X cursor-down; send -X start-of-line }
bind -T copy-mode-vi k { send -X cursor-up; send -X start-of-line }

# F4 - copy current pane path to clipboard via OSC52 (works on all platforms)
bind -n F4 run "printf '\033]52;c;%s\007' $(printf '%s' '#{pane_current_path}' | base64 | tr -d '\n') > '#{pane_tty}'" \; display "#{pane_current_path} copied!"

bind r source ~/.config/tmux/tmux.conf \; display "Config reloaded!"
